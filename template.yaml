AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Shared infrastructure for serverless applications — VPC, RDS PostgreSQL, Cognito

# ──────────────────────────────────────────────
# Parameters
# ──────────────────────────────────────────────
Parameters:
  Project:
    Type: String
    Description: Project name used for resource naming
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
  PrivateSubnet1Cidr:
    Type: String
    Default: "10.0.1.0/24"
  PrivateSubnet2Cidr:
    Type: String
    Default: "10.0.2.0/24"
  PublicSubnetCidr:
    Type: String
    Default: "10.0.100.0/24"
  RdsInstanceClass:
    Type: String
    Default: db.t4g.large
  RdsDbName:
    Type: String
    Default: appdb
  RdsAllocatedStorage:
    Type: Number
    Default: 20

Conditions:
  IsProd: !Equals [!Ref Environment, prod]

# ──────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────
Resources:

  # ── VPC ──
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-vpc"
        - Key: project
          Value: !Ref Project
        - Key: environment
          Value: !Ref Environment

  # ── Private Subnets (2 AZs) ──
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-private-1"
        - Key: project
          Value: !Ref Project
        - Key: environment
          Value: !Ref Environment

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-private-2"
        - Key: project
          Value: !Ref Project
        - Key: environment
          Value: !Ref Environment

  # ── Route Table for Private Subnets ──
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-private-rt"
        - Key: project
          Value: !Ref Project
        - Key: environment
          Value: !Ref Environment

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ── Public Subnet ──
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-public"
        - Key: project
          Value: !Ref Project
        - Key: environment
          Value: !Ref Environment

  # ── Internet Gateway ──
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-igw"
        - Key: project
          Value: !Ref Project
        - Key: environment
          Value: !Ref Environment

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # ── Route Table for Public Subnet ──
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-public-rt"
        - Key: project
          Value: !Ref Project
        - Key: environment
          Value: !Ref Environment

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ── Bastion Host ──
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${Project}-${Environment}-bastion-sg"
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-bastion-sg"
        - Key: project
          Value: !Ref Project
        - Key: environment
          Value: !Ref Environment

  BastionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Project}-${Environment}-bastion-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite

  BastionInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BastionRole

  BastionHost:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t4g.small
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64}}"
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref BastionSecurityGroup
      IamInstanceProfile: !Ref BastionInstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          dnf install -y postgresql16 jq
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-bastion"
        - Key: project
          Value: !Ref Project
        - Key: environment
          Value: !Ref Environment

  # ── VPC Endpoint: Secrets Manager ──
  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.secretsmanager"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup

  # ── Security Group: VPC Endpoints ──
  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${Project}-${Environment}-vpce-sg"
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VpcCidr
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-vpce-sg"
        - Key: project
          Value: !Ref Project
        - Key: environment
          Value: !Ref Environment

  # ── Security Group: RDS ──
  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${Project}-${Environment}-rds-sg"
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref VpcCidr
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-rds-sg"
        - Key: project
          Value: !Ref Project
        - Key: environment
          Value: !Ref Environment

  # ── RDS Subnet Group ──
  RdsSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "${Project}-${Environment} private subnets"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  # ── RDS PostgreSQL ──
  RdsInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "${Project}-${Environment}"
      Engine: postgres
      EngineVersion: "17.4"
      DBInstanceClass: !Ref RdsInstanceClass
      AllocatedStorage: !Ref RdsAllocatedStorage
      DBName: !Ref RdsDbName
      MasterUsername: dbadmin
      ManageMasterUserPassword: true
      DBSubnetGroupName: !Ref RdsSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      MultiAZ: false
      PubliclyAccessible: false
      StorageEncrypted: true
      DeletionProtection: false
      Tags:
        - Key: project
          Value: !Ref Project
        - Key: environment
          Value: !Ref Environment

  # ── Cognito User Pool ──
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${Project}-${Environment}-users"
      DeletionProtection: !If [IsProd, ACTIVE, INACTIVE]
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      UserPoolTags:
        project: !Ref Project
        environment: !Ref Environment

  # ── Cognito Group (shared by all app teams) ──
  CognitoAppUserGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: app-user-group
      UserPoolId: !Ref CognitoUserPool
      Description: Shared group for all app teams

# ──────────────────────────────────────────────
# Outputs
# ──────────────────────────────────────────────
Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref Vpc
    Export:
      Name: !Sub "${Project}-${Environment}-VpcId"
  PrivateSubnetIds:
    Description: Private subnet IDs (comma-separated)
    Value: !Sub "${PrivateSubnet1},${PrivateSubnet2}"
    Export:
      Name: !Sub "${Project}-${Environment}-PrivateSubnetIds"
  PublicSubnetId:
    Description: Public subnet ID
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub "${Project}-${Environment}-PublicSubnetId"
  BastionInstanceId:
    Description: Bastion host instance ID (connect via Session Manager)
    Value: !Ref BastionHost
  RdsEndpoint:
    Description: RDS endpoint (provide to app teams as RdsHost)
    Value: !GetAtt RdsInstance.Endpoint.Address
    Export:
      Name: !Sub "${Project}-${Environment}-RdsEndpoint"
  RdsAdminSecretArn:
    Description: RDS admin secret ARN (infra team only - do NOT share with app teams)
    Value: !GetAtt RdsInstance.MasterUserSecret.SecretArn
  RdsSecurityGroupId:
    Description: RDS security group ID
    Value: !Ref RdsSecurityGroup
    Export:
      Name: !Sub "${Project}-${Environment}-RdsSecurityGroupId"
  RdsDbName:
    Description: Database name
    Value: !Ref RdsDbName
  CognitoUserPoolId:
    Description: Cognito User Pool ID (provide to app teams)
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub "${Project}-${Environment}-CognitoUserPoolId"
  CognitoUserPoolArn:
    Description: Cognito User Pool ARN (provide to app teams)
    Value: !GetAtt CognitoUserPool.Arn
    Export:
      Name: !Sub "${Project}-${Environment}-CognitoUserPoolArn"
  CognitoGroupName:
    Description: Cognito group name (provide to app teams as AllowedCognitoGroup)
    Value: app-user-group
  CognitoAppUsername:
    Description: App user (create after deploy - see README)
    Value: appuser@aws.local
  CognitoAppPassword:
    Description: App user password (create after deploy - see README)
    Value: AppP@ssw0rd!
  DbUsername:
    Description: Shared database username (create after deploy - see README)
    Value: dbuser
  DbPassword:
    Description: Shared database password (create after deploy - see README)
    Value: dbpass
